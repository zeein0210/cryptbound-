<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTBOUND :: 수명결</title>
    <style>
        body { 
            font-family: 'Nanum Gothic', sans-serif; 
            padding: 20px; 
            background: #1e1e1e; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 850px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #800020; font-size: 2.2em; margin-bottom: 30px; }
        h3 { color: #ffffff; border-left: 4px solid #800020; padding-left: 10px; margin-top: 30px; align-self: flex-start; }
        
        #setup {
            background: #2d2d2d;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #444;
            width: 100%;
            max-width: 400px;
        }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 20px 0; background: #2d2d2d; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #3d3d3d; }
        th { background: #3d3d3d; color: #ffffff; }
        
        input, select { background: #444; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 8px; text-align: center; }
        button { padding: 12px 30px; cursor: pointer; background: #800020; color: #ffffff; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; }
        button:hover { background: #a00028; }

        #result-area { 
            width: 100%; background: #2d2d2d; padding: 25px; border-radius: 12px; border: 1px solid #444; margin-top: 30px; box-sizing: border-box; 
        }
        #result-text { font-family: inherit; white-space: pre-wrap; font-size: 0.95em; line-height: 1.7; }
        
        .card-tag { background: #444; color: #ffffff; padding: 3px 8px; border-radius: 4px; font-size: 0.85em; margin-right: 4px; border: 1px solid #555; }
        .life-point { color: #03dac6; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CRYPTBOUND :: 수명결</h1>

        <div id="setup">
            <h3 style="margin: 0 0 20px 0; border: none; text-align: center;">🎮 게임 설정</h3>
            <label style="display: block; margin-bottom: 10px;">참여 인원</label>
            <select id="player-count" style="width: 100px;">
                <option value="2">2명</option>
                <option value="3">3명</option>
                <option value="4">4명</option>
            </select>
            <br>
            <button onclick="setupPlayers()">설정 완료</button>
        </div>

        <div id="player-input-area" style="display:none; width:100%;">
            <h3>👥 참여자 정보</h3>
            <table>
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>초기 수명</th>
                        <th>배분된 패</th>
                    </tr>
                </thead>
                <tbody id="player-body"></tbody>
            </table>
            <button onclick="distributeCards()">게임 시작</button>
        </div>

        <div id="round-area" style="display:none; width:100%;">
            <h3 id="round-title">🎮 라운드 진행</h3>
            <table>
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>보유 패</th>
                        <th>패 선택</th>
                        <th>베팅</th>
                    </tr>
                </thead>
                <tbody id="round-body"></tbody>
            </table>
            <button onclick="calculateRound()">결과 산출 및 정산</button>
        </div>

        <div id="result-area" style="display:none;">
            <h4 style="margin:0 0 15px 0; border-bottom: 1px solid #444; padding-bottom: 10px;">📋 라운드 정산 리포트 (복붙용)</h4>
            <div id="result-text"></div>
            <button onclick="nextRound()" style="background: #444; border: 1px solid #555;">다음 라운드로</button>
        </div>
    </div>

    <script>
        const CARDS = {
            "나비": {score: 10, wins: "제비"},
            "두루미": {score: 8, wins: "사슴"},
            "제비": {score: 6, wins: "멧돼지"},
            "사슴": {score: 4, wins: "나비"},
            "멧돼지": {score: 2, wins: "두루미"}
        };
        const cardNames = Object.keys(CARDS);
        let players = [];
        let currentRound = 1;

        function setupPlayers() {
            const count = document.getElementById('player-count').value;
            const body = document.getElementById('player-body');
            body.innerHTML = '';
            players = [];
            for(let i=0; i<count; i++) {
                body.innerHTML += `<tr>
                    <td><input type="text" value="P${i+1}" id="name-${i}"></td>
                    <td><input type="number" value="100" id="life-${i}"></td>
                    <td id="hand-display-${i}">-</td>
                </tr>`;
            }
            document.getElementById('player-input-area').style.display = 'block';
            document.getElementById('setup').style.display = 'none';
        }

        function distributeCards() {
            const count = document.getElementById('player-count').value;
            for(let i=0; i<count; i++) {
                const hand = [
                    cardNames[Math.floor(Math.random()*5)],
                    cardNames[Math.floor(Math.random()*5)],
                    cardNames[Math.floor(Math.random()*5)]
                ];
                players.push({
                    name: document.getElementById(`name-${i}`).value,
                    life: parseInt(document.getElementById(`life-${i}`).value),
                    hand: hand
                });
            }
            startRound();
        }

        function startRound() {
            document.getElementById('player-input-area').style.display = 'none';
            document.getElementById('round-area').style.display = 'block';
            document.getElementById('round-title').innerText = `🎮 제 ${currentRound} 라운드 진행`;
            const body = document.getElementById('round-body');
            body.innerHTML = '';
            players.forEach((p, i) => {
                let options = p.hand.map(c => `<option value="${c}">${c}</option>`).join('');
                body.innerHTML += `<tr>
                    <td><strong>${p.name}</strong><br><small class="life-point">❤️ ${p.life}</small></td>
                    <td>${p.hand.map(h => `<span class="card-tag">${h}</span>`).join('')}</td>
                    <td><select id="pick-${i}">${options}</select></td>
                    <td><input type="number" id="bet-${i}" style="width:60px;" value="10"></td>
                </tr>`;
            });
        }

        function calculateRound() {
            let roundPicks = players.map((p, i) => ({
                player: p,
                pick: document.getElementById(`pick-${i}`).value,
                bet: parseInt(document.getElementById(`bet-${i}`).value)
            }));

            const boarActive = roundPicks.some(d => d.pick === "멧돼지");
            let totalPool = roundPicks.reduce((sum, d) => sum + d.bet, 0);
            
            let resultMsg = `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n     제 ${currentRound} 라운드 정산 결과\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

            roundPicks.forEach(d => {
                let cardPoint = CARDS[d.pick].score;
                let betPoint = d.bet;
                let bonus = 0;
                if(!boarActive) {
                    roundPicks.forEach(opp => {
                        if(d === opp) return;
                        if(CARDS[d.pick].wins === opp.pick) bonus += 3;
                        else if(CARDS[opp.pick].wins === d.pick) bonus -= 1;
                    });
                }
                d.totalScore = cardPoint + betPoint + bonus;
                resultMsg += `[${d.player.name}] 제출 카드 : ${d.pick}\n`;
                resultMsg += `카드 점수(${cardPoint}) + 베팅(${betPoint}) + 상성(${bonus}) = 총합 ${d.totalScore}점\n\n`;
            });

            const winnerData = roundPicks.reduce((prev, curr) => (prev.totalScore > curr.totalScore) ? prev : curr);
            resultMsg += `🏆 라운드 최종 승리자: ${winnerData.player.name}\n\n`;

            roundPicks.forEach(d => {
                let p = d.player;
                if(p === winnerData.player) {
                    let gain = totalPool;
                    if(d.pick === "두루미" && !boarActive) gain *= 2;
                    p.life += gain;
                    resultMsg += ` ✅ ${p.name}: +${gain}년 변동\n`; // 수명 노출 안함
                } else {
                    let loss = d.bet;
                    if(d.pick === "두루미" && !boarActive) loss = Math.floor(loss/2);
                    p.life -= loss;
                    resultMsg += ` 🔻 ${p.name}: -${loss}년 변동\n`; // 수명 노출 안함
                }
                p.hand.splice(p.hand.indexOf(d.pick), 1);
            });

            document.getElementById('result-text').innerText = resultMsg;
            document.getElementById('result-area').style.display = 'block';
        }

        function nextRound() {
            currentRound++;
            if(currentRound > 3) {
                alert("3라운드 종료. 게임이 끝났습니다!");
            } else {
                document.getElementById('result-area').style.display = 'none';
                startRound();
            }
        }
    </script>
</body>
</html>
