<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTBOUND :: 수명결</title>
    <style>
        body { 
            font-family: 'Nanum Gothic', sans-serif; 
            padding: 20px; 
            background: #1e1e1e; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 850px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #800020; font-size: 2.2em; margin-bottom: 30px; }
        
        #setup {
            background: #2d2d2d; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #444; width: 100%; max-width: 400px;
        }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 20px 0; background: #2d2d2d; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #3d3d3d; }
        th { background: #3d3d3d; color: #ffffff; }
        
        input, select { background: #444; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 8px; text-align: center; }
        
        button { padding: 12px 30px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; transition: 0.2s; }
        .btn-burgundy { background: #800020; color: #ffffff; }
        .btn-mint { background: #03dac6; color: #000000; }

        #result-area { width: 100%; margin-top: 30px; }
        .report-box { 
            background: #2d2d2d; padding: 25px; border-radius: 12px; border: 1px solid #444; margin-bottom: 20px;
        }
        #result-text { white-space: pre-wrap; font-size: 0.95em; line-height: 1.7; }
        
        .skill-log-box {
            background: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #800020; color: #ffeb3b; font-size: 0.85em;
        }
        .card-tag { background: #444; padding: 3px 8px; border-radius: 4px; font-size: 0.85em; margin-right: 4px; }
        .life-point { color: #03dac6; font-weight: bold; }
        
        .end-msg {
            color: #800020; font-weight: bold; font-size: 1.2em; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CRYPTBOUND :: 수명결</h1>

        <div id="setup">
            <h3 style="margin: 0 0 20px 0; border: none;">🎮 게임 설정</h3>
            <label>참여 인원</label><br>
            <select id="player-count" style="margin-top:10px;">
                <option value="2">2명</option>
                <option value="3">3명</option>
                <option value="4">4명</option>
            </select><br>
            <button class="btn-burgundy" onclick="setupPlayers()">설정 완료</button>
        </div>

        <div id="player-input-area" style="display:none; width:100%;">
            <h3>👥 참여자 정보</h3>
            <table>
                <thead>
                    <tr><th>이름</th><th>초기 수명</th><th>상태</th></tr>
                </thead>
                <tbody id="player-body"></tbody>
            </table>
            <button class="btn-burgundy" onclick="distributeCards()">게임 시작</button>
        </div>

        <div id="round-area" style="display:none; width:100%;">
            <h3 id="round-title">🎮 라운드 진행</h3>
            <table>
                <thead>
                    <tr><th>이름</th><th>보유 패</th><th>패 선택</th><th>베팅</th></tr>
                </thead>
                <tbody id="round-body"></tbody>
            </table>
            <button class="btn-burgundy" onclick="calculateRound()">결과 산출 및 정산</button>
        </div>

        <div id="result-area" style="display:none;">
            <div class="report-box">
                <h4 style="margin:0 0 15px 0; color:#03dac6;">📋 라운드 정산 리포트 (복붙용)</h4>
                <div id="result-text"></div>
            </div>

            <div class="skill-log-box">
                <h4 style="margin:0 0 10px 0; color:#ffeb3b;">📜 스킬 발동 로그 (관리자용)</h4>
                <div id="skill-log-text"></div>
            </div>
            
            <div id="action-container" style="text-align: center; margin-top: 20px;">
                </div>
        </div>
    </div>

    <script>
        const CARDS = {
            "나비": {score: 10, wins: "제비"},
            "두루미": {score: 8, wins: "사슴"},
            "제비": {score: 6, wins: "멧돼지"},
            "사슴": {score: 4, wins: "나비"},
            "멧돼지": {score: 2, wins: "두루미"}
        };
        const cardNames = Object.keys(CARDS);
        let players = [];
        let currentRound = 1;

        function setupPlayers() {
            const count = document.getElementById('player-count').value;
            const body = document.getElementById('player-body');
            body.innerHTML = '';
            players = [];
            for(let i=0; i<count; i++) {
                body.innerHTML += `<tr>
                    <td><input type="text" value="P${i+1}" id="name-${i}"></td>
                    <td><input type="number" value="100" id="life-${i}"></td>
                    <td id="hand-display-${i}">대기 중</td>
                </tr>`;
            }
            document.getElementById('player-input-area').style.display = 'block';
            document.getElementById('setup').style.display = 'none';
        }

        function distributeCards() {
            for(let i=0; i<document.getElementById('player-count').value; i++) {
                const hand = [cardNames[Math.floor(Math.random()*5)], cardNames[Math.floor(Math.random()*5)], cardNames[Math.floor(Math.random()*5)]];
                players.push({
                    name: document.getElementById(`name-${i}`).value,
                    life: parseInt(document.getElementById(`life-${i}`).value),
                    hand: hand
                });
            }
            startRound();
        }

        function startRound() {
            document.getElementById('player-input-area').style.display = 'none';
            document.getElementById('round-area').style.display = 'block';
            document.getElementById('round-title').innerText = `🎮 제 ${currentRound} 라운드 진행`;
            const body = document.getElementById('round-body');
            body.innerHTML = '';
            players.forEach((p, i) => {
                let options = p.hand.map(c => `<option value="${c}">${c}</option>`).join('');
                body.innerHTML += `<tr>
                    <td><strong>${p.name}</strong><br><small class="life-point">❤️ ${p.life}</small></td>
                    <td>${p.hand.map(h => `<span class="card-tag">${h}</span>`).join('')}</td>
                    <td><select id="pick-${i}">${options}</select></td>
                    <td><input type="number" id="bet-${i}" style="width:60px;" value="10"></td>
                </tr>`;
            });
        }

        function calculateRound() {
            let roundPicks = players.map((p, i) => ({
                player: p, pick: document.getElementById(`pick-${i}`).value, bet: parseInt(document.getElementById(`bet-${i}`).value)
            }));

            const boarActive = roundPicks.some(d => d.pick === "멧돼지");
            let totalPool = roundPicks.reduce((sum, d) => sum + d.bet, 0);
            
            let resultMsg = `━━━━━━━━━━━━━━━━━━━━━━\n   제 ${currentRound} 라운드 정산 결과\n━━━━━━━━━━━━━━━━━━━━━━\n\n`;
            let skillLog = "";

            roundPicks.forEach(d => {
                let cardPoint = CARDS[d.pick].score;
                let bonus = 0;
                if(!boarActive) {
                    roundPicks.forEach(opp => {
                        if(d === opp) return;
                        if(CARDS[d.pick].wins === opp.pick) bonus += 3;
                        else if(CARDS[opp.pick].wins === d.pick) bonus -= 1;
                    });
                }
                d.totalScore = cardPoint + d.bet + bonus;
                resultMsg += `[${d.player.name}] 제출 카드 : ${d.pick}\n카드 점수(${cardPoint}) + 베팅(${d.bet}) + 상성(${bonus}) = 총합 ${d.totalScore}점\n\n`;
            });

            const winnerData = roundPicks.reduce((prev, curr) => (prev.totalScore > curr.totalScore) ? prev : curr);
            resultMsg += `✨ 라운드 승리자: ${winnerData.player.name} ✨\n\n`;

            roundPicks.forEach(d => {
                let p = d.player;
                p.hand.splice(p.hand.indexOf(d.pick), 1);

                if(d.pick === "나비" && !boarActive) {
                    const recovered = cardNames[Math.floor(Math.random()*5)];
                    p.hand.push(recovered);
                    skillLog += `🦋 ${p.name}: [나비 효과]로 [${recovered}] 획득\n`;
                }

                if(p === winnerData.player) {
                    let gain = totalPool;
                    if(d.pick === "두루미" && !boarActive) {
                        gain *= 2;
                        skillLog += `🦢 ${p.name}: [두루미 보너스 x2] 적용\n`;
                    }
                    p.life += gain;
                    resultMsg += `✅ ${p.name}: +${gain}년 변동\n`;
                } else {
                    let loss = d.bet;
                    if(d.pick === "두루미" && !boarActive) {
                        loss = Math.floor(loss/2);
                        skillLog += `🦢 ${p.name}: [두루미 소모 감면] 적용\n`;
                    }
                    p.life -= loss;
                    resultMsg += `🔻 ${p.name}: -${loss}년 변동\n`;
                }
            });

            if(boarActive) skillLog += `🐗 멧돼지 효과: 모든 스킬 및 상성이 무효화되었습니다.\n`;

            document.getElementById('result-text').innerText = resultMsg;
            document.getElementById('skill-log-text').innerText = skillLog || "발동된 특수 효과가 없습니다.";
            document.getElementById('result-area').style.display = 'block';
            
            // 버튼 제어 로직
            const actionArea = document.getElementById('action-container');
            if(currentRound < 3) {
                actionArea.innerHTML = `<button class="btn-mint" onclick="nextRound()">다음 라운드로</button>`;
            } else {
                actionArea.innerHTML = `<div class="end-msg">수명결이 종료되었습니다.</div>`;
            }
        }

        function nextRound() {
            currentRound++;
            document.getElementById('result-area').style.display = 'none'; 
            startRound();
        }
    </script>
</body>
</html>
