<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTBOUND :: 수명결</title>
    <style>
        /* 다크모드 및 중앙 정렬 디자인 */
        body { 
            font-family: 'Nanum Gothic', sans-serif; 
            padding: 20px; 
            background: #121212; 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }
        .container { 
            width: 100%; 
            max-width: 800px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #800020; text-align: center; font-size: 2.5em; margin-bottom: 30px; }
        h3 { color: #800020; margin-top: 30px; }
        
        /* 중앙 설정 영역 */
        #setup {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #333;
        }
        
        /* 테이블 디자인 */
        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0;
            margin: 20px 0; 
            background: #1e1e1e; 
            border-radius: 15px; 
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        th { background: #2d2d2d; color: #800020; font-weight: bold; }
        
        /* 입력창 및 버튼 */
        input, select { 
            background: #2d2d2d; 
            color: white; 
            border: 1px solid #444; 
            padding: 10px; 
            border-radius: 12px; 
            text-align: center;
            outline: none;
        }
        button { 
            padding: 12px 30px; 
            cursor: pointer; 
            background: #800020; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-weight: bold;
            transition: 0.3s;
            margin-top: 15px;
        }
        button:hover { background: #a00028; transform: scale(1.05); }

        /* 결과 창 (민트/시안 포인트) */
        #result-area { 
            width: 100%;
            background: #0a0a0a; 
            padding: 25px; 
            border-radius: 20px; 
            border: 2px solid #03dac6;
            margin-top: 30px;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.8;
            box-sizing: border-box;
        }
        .card-tag { 
            background: #333; 
            color: #03dac6;
            padding: 3px 10px; 
            border-radius: 8px; 
            font-size: 0.85em; 
            margin-right: 5px;
            border: 1px solid #444;
        }
        .winner-text {
            color: #03dac6;
            font-weight: bold;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CRYPTBOUND :: 수명결</h1>

        <div id="setup">
            <h3 style="margin-top:0;">인원 설정</h3>
            <label style="margin-right: 10px;">참여 인원</label>
            <select id="player-count">
                <option value="2">2명</option>
                <option value="3">3명</option>
                <option value="4">4명</option>
            </select>
            <br>
            <button onclick="setupPlayers()">설정 완료</button>
        </div>

        <div id="player-input-area" style="display:none; width:100%;">
            <h3>참여자 정보</h3>
            <table>
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>초기 수명</th>
                        <th>배분된 패</th>
                    </tr>
                </thead>
                <tbody id="player-body"></tbody>
            </table>
            <button onclick="distributeCards()">게임 시작</button>
        </div>

        <div id="round-area" style="display:none; width:100%;">
            <h3 id="round-title"> 1라운드 진행</h3>
            <table>
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>보유 패</th>
                        <th>패 선택</th>
                        <th>베팅</th>
                    </tr>
                </thead>
                <tbody id="round-body"></tbody>
            </table>
            <button onclick="calculateRound()">결과 산출 및 정산</button>
        </div>

        <div id="result-area" style="display:none;">
            <h4 style="margin:0 0 15px 0; color:#03dac6; text-align:center;"> 라운드 결과</h4>
            <div id="result-text" style="white-space: pre-wrap;"></div>
            <button onclick="nextRound()" style="background:#03dac6; color:#000;">다음 라운드로</button>
        </div>
    </div>

    <script>
        const CARDS = {
            "나비": {score: 10, wins: "제비"},
            "두루미": {score: 8, wins: "사슴"},
            "제비": {score: 6, wins: "멧돼지"},
            "사슴": {score: 4, wins: "나비"},
            "멧돼지": {score: 2, wins: "두루미"}
        };
        const cardNames = Object.keys(CARDS);
        let players = [];
        let currentRound = 1;

        function setupPlayers() {
            const count = document.getElementById('player-count').value;
            const body = document.getElementById('player-body');
            body.innerHTML = '';
            players = []; // 배열 초기화
            for(let i=0; i<count; i++) {
                body.innerHTML += `<tr>
                    <td><input type="text" value="P${i+1}" id="name-${i}"></td>
                    <td><input type="number" value="100" id="life-${i}"></td>
                    <td id="hand-display-${i}">-</td>
                </tr>`;
            }
            document.getElementById('player-input-area').style.display = 'block';
            document.getElementById('setup').style.display = 'none';
        }

        function distributeCards() {
            const count = document.getElementById('player-count').value;
            for(let i=0; i<count; i++) {
                const hand = [
                    cardNames[Math.floor(Math.random()*5)],
                    cardNames[Math.floor(Math.random()*5)],
                    cardNames[Math.floor(Math.random()*5)]
                ];
                players.push({
                    name: document.getElementById(`name-${i}`).value,
                    life: parseInt(document.getElementById(`life-${i}`).value),
                    hand: hand
                });
                document.getElementById(`hand-display-${i}`).innerText = hand.join(', ');
            }
            startRound();
        }

        function startRound() {
            document.getElementById('player-input-area').style.display = 'none';
            document.getElementById('round-area').style.display = 'block';
            document.getElementById('round-title').innerText = ` 제 ${currentRound} 라운드 진행`;
            const body = document.getElementById('round-body');
            body.innerHTML = '';
            players.forEach((p, i) => {
                let options = p.hand.map(c => `<option value="${c}">${c}</option>`).join('');
                body.innerHTML += `<tr>
                    <td><strong>${p.name}</strong><br><small style="color:#03dac6">❤️ ${p.life}</small></td>
                    <td>${p.hand.map(h => `<span class="card-tag">${h}</span>`).join('')}</td>
                    <td><select id="pick-${i}">${options}</select></td>
                    <td><input type="number" id="bet-${i}" style="width:50px;" value="10"></td>
                </tr>`;
            });
        }

        function calculateRound() {
            let roundPicks = players.map((p, i) => ({
                player: p,
                pick: document.getElementById(`pick-${i}`).value,
                bet: parseInt(document.getElementById(`bet-${i}`).value)
            }));

            const boarActive = roundPicks.some(d => d.pick === "멧돼지");
            let totalPool = roundPicks.reduce((sum, d) => sum + d.bet, 0);
            
            let resultMsg = `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n     제 ${currentRound} 라운드 정산 결과\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

            roundPicks.forEach(d => {
                let cardPoint = CARDS[d.pick].score;
                let betPoint = d.bet;
                let bonus = 0;

                if(!boarActive) {
                    roundPicks.forEach(opp => {
                        if(d === opp) return;
                        if(CARDS[d.pick].wins === opp.pick) bonus += 3;
                        else if(CARDS[opp.pick].wins === d.pick) bonus -= 1;
                    });
                }
                d.totalScore = cardPoint + betPoint + bonus;
                
                resultMsg += `[${d.player.name}] 제출 카드 : ${d.pick}\n`;
                resultMsg += `카드 점수(${cardPoint}) + 베팅(${betPoint}) + 상성(${bonus}) = 총합 ${d.totalScore}점\n\n`;
            });

            const winnerData = roundPicks.reduce((prev, curr) => (prev.totalScore > curr.totalScore) ? prev : curr);
            resultMsg += ` 라운드 최종 승리자: ${winnerData.player.name} \n\n`;

            roundPicks.forEach(d => {
                let p = d.player;
                if(p === winnerData.player) {
                    let gain = totalPool;
                    if(d.pick === "두루미" && !boarActive) gain *= 2;
                    p.life += gain;
                    resultMsg += `  ${p.name}: +${gain}년 (현재: ${p.life}년)\n`;
                } else {
                    let loss = d.bet;
                    if(d.pick === "두루미" && !boarActive) loss = Math.floor(loss/2);
                    p.life -= loss;
                    resultMsg += `  ${p.name}: -${loss}년 (현재: ${p.life}년)\n`;
                }
                p.hand.splice(p.hand.indexOf(d.pick), 1);
            });

            document.getElementById('result-text').innerText = resultMsg;
            document.getElementById('result-area').style.display = 'block';
            if(boarActive) alert("🐗 멧돼지 효과: 상성 및 능력이 무효화되었습니다!");
        }

        function nextRound() {
            currentRound++;
            if(currentRound > 3) {
                alert("3라운드가 종료되었습니다. 최종 결과를 확인하세요.");
            } else {
                document.getElementById('result-area').style.display = 'none';
                startRound();
            }
        }
    </script>
</body>
</html>
